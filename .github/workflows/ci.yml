# CI for the runner. fmt + clippy + test + build on every push/PR.
# Linux-only per commit to keep CI minutes down; the full cross-platform matrix runs at
# release time (release.yml, on tags).

name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'LICENSE']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'LICENSE']

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all
      - run: cargo build --release
