# Release: cross-compile the runner and publish binaries to a GitHub Release.
#
# Triggered on pushing a tag like `v0.1.0`. Plain cargo per target — no cargo-dist, no
# unified build tool. The matrix builds + uploads ARTIFACTS; a single final job collects
# them and creates the Release in ONE call, so the jobs never race to create the release
# (which is what dropped an asset on the first v0.1.0 run).
#
# Asset names MUST match the triple→asset mapping in the installer
# (apps/web/static/install.sh in the llamabench.ai repo, served at
# https://llamabench.ai/install.sh), or `curl … | sh` will 404.

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # the release job creates/updates the Release for the tag.

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      # Package the single binary deterministically: llamabench-<triple>.tar.gz on unix
      # (binary `llamabench`), llamabench-<triple>.zip on windows (`llamabench.exe`).
      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: tar -czf "llamabench-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" llamabench

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "target/${{ matrix.target }}/release/llamabench.exe" -DestinationPath "llamabench-${{ matrix.target }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: llamabench-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Collect artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/**/llamabench-*
          fail_on_unmatched_files: true
