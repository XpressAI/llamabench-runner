# Release: cross-compile the runner and publish binaries to a GitHub Release.
#
# Triggered on pushing a tag like `v0.1.0`. Plain cargo per target — no cargo-dist, no
# unified build tool. The asset names here MUST match the triple→asset mapping in the
# installer (apps/web/static/install.sh in the llamabench.ai repo, served at
# https://llamabench.ai/install.sh), or `curl … | sh` will 404.

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # softprops/action-gh-release creates/updates the Release for the tag.

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      # Package the single binary deterministically: llamabench-<triple>.tar.gz on unix
      # (binary `llamabench`), llamabench-<triple>.zip on windows (`llamabench.exe`).
      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive="llamabench-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" llamabench
          echo "ASSET=$archive" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "llamabench-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/llamabench.exe" -DestinationPath $archive
          "ASSET=$archive" >> $env:GITHUB_ENV

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
